{% extends "mail/layout.html" %}
{% load static %}

{% block body %}

<h2>{{ request.user.email }}</h2>

<div id="user-nav">
  <button id="inbox" class="btn btn-sm btn-outline-primary">Inbox</button>
  <button id="compose" class="btn btn-sm btn-outline-primary">Compose</button>
  <button id="sent" class="btn btn-sm btn-outline-primary">Sent</button>
  <button id="archived" class="btn btn-sm btn-outline-primary">Archived</button>
  <a class="btn btn-sm btn-outline-primary" href="{% url 'logout' %}">Log Out</a>
</div>
<hr>

<div id="emails-view">
</div>

<div id="email-view">
</div>

<div id="compose-view">
  <h3>New Email</h3>
  <div id="compose-error" style="color: red;"></div>
  <form id="compose-form">
    <div class="form-group">
      <label for="compose-recipients">From:</label>
      <input disabled class="form-control" value="{{ request.user.email }}">
    </div>
    <div class="form-group">
      <label for="compose-recipients">To:</label>
      <input id="compose-recipients" class="form-control">
    </div>
    <div class="form-group">
      <input class="form-control" id="compose-subject" placeholder="Subject">
    </div>
    <textarea class="form-control" id="compose-body" placeholder="Body"></textarea>
    <input type="submit" class="btn btn-primary" value="Send">
  </form>
</div>

{% endblock %}

{% block script %}
<script src="{% static 'mail/inbox.js' %}"></script>
{% endblock %}
